name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          cd client
          pnpm install --no-frozen-lockfile

      - name: Generate native project
        env:
          CI: 1
        run: |
          cd client
          npx expo prebuild --platform android --clean

      - name: Configure release signing
        run: |
          cd client/android
          # 使用 Python 修改 build.gradle 添加 release 签名配置
          python3 << 'EOF'
          import re
          
          gradle_path = 'app/build.gradle'
          with open(gradle_path, 'r') as f:
              content = f.read()
          
          # 添加 signingConfigs（如果不存在）
          signing_config = '''
              signingConfigs {
                  release {
                      storeFile file(System.getenv("ANDROID_SDK_ROOT") + "/debug.keystore")
                      storePassword "android"
                      keyAlias "androiddebugkey"
                      keyPassword "android"
                  }
              }
          '''
          
          # 在 android {} 块内添加 signingConfigs
          if 'signingConfigs' not in content:
              content = content.replace('android {', 'android {' + signing_config)
          
          # 在 release buildType 中添加 signingConfig
          content = re.sub(
              r'(buildTypes\s*\{\s*release\s*\{)',
              r'\1\n            signingConfig signingConfigs.release',
              content
          )
          
          with open(gradle_path, 'w') as f:
              f.write(content)
          
          print("Signing configuration added successfully")
          EOF

      - name: Build APK (Release)
        run: |
          cd client/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: client/android/app/build/outputs/apk/release/app-release.apk
